# @format

version: "3.9"

services:
  app:
    image: ${IMAGE_NAME:-jeanliruby/go-task-queue}:${IMAGE_TAG:-latest}
    container_name: go-task-queue
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      REDIS_ADDR: redis:6379
      WORKERS: ${WORKERS:-4}
      HTTP_ADDR: :8080
      HANDLERS_CONFIG: /app/config/handlers.json
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_CLASS: ${LOG_CLASS:-}
      MONGODB_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-go_task_queue}
      MONGO_DLQ_COLLECTION: ${MONGO_DLQ_COLLECTION:-dlq_jobs}
      MONGO_LOG_COLLECTION: ${MONGO_LOG_COLLECTION:-log_entries}
    depends_on:
      - redis
      - mongo

  redis:
    image: redis:7-alpine
    container_name: go-task-queue-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  mongo:
    image: mongo:7
    container_name: go-task-queue-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
